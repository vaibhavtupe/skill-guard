name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_version:
        description: "PyPI version to smoke test (e.g., 0.6.0). Leave blank to test from main wheel."
        required: false
        default: ""

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit/ -v --cov=skill_guard --cov-report=xml

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run integration tests (mock agent)
        run: pytest tests/integration/ -v -m integration --no-cov

  embeddings-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install torch CPU wheel
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
      - name: Install project with embeddings dependencies
        run: python -m pip install -e ".[dev,embeddings]"
      - name: Verify torch CPU is available
        run: |
          python - <<'PY'
          import torch

          tensor = torch.tensor([1.0])
          assert tensor.device.type == "cpu"
          print(f"torch {torch.__version__} on {tensor.device.type}")
          PY
      - name: Run embeddings tests
        run: pytest tests/unit/test_similarity.py -k embeddings -v --no-cov

  release-smoke:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, embeddings-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install torch CPU wheel
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
      - name: Install release (PyPI) or main
        run: |
          if [ -n "${{ github.event.inputs.release_version }}" ]; then
            python -m pip install "skill-guard[embeddings]==${{ github.event.inputs.release_version }}"
          else
            python -m pip install -e ".[dev,embeddings]"
          fi
      - name: Verify torch CPU is available
        run: |
          python - <<'PY'
          import torch

          tensor = torch.tensor([1.0])
          assert tensor.device.type == "cpu"
          print(f"torch {torch.__version__} on {tensor.device.type}")
          PY
      - name: Smoke test core CLI features
        run: |
          tmpdir=$(mktemp -d)
          python - <<'PY'
          from pathlib import Path

          valid_dir = Path("tests/fixtures/skills/valid-skill")
          injection_dir = Path("tests/fixtures/skills/injection-skill")
          assert valid_dir.exists(), "valid fixture missing"
          assert injection_dir.exists(), "injection fixture missing"
          PY
          # README-aligned smoke
          skill-guard validate tests/fixtures/skills/valid-skill
          skill-guard secure tests/fixtures/skills/valid-skill
          skill-guard conflict tests/fixtures/skills/valid-skill --against tests/fixtures/skills/injection-skill
          skill-guard conflict tests/fixtures/skills/valid-skill --against tests/fixtures/skills/injection-skill --method embeddings
          skill-guard check tests/fixtures/skills/valid-skill --against tests/fixtures/skills/injection-skill
          (cd "$tmpdir" && skill-guard init)
